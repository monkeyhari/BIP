<!DOCTYPE html>
<html>
<head>
<title>Business Success Predictor</title>

<style>
body{
    font-family: Arial;
    background:#f4f6f9;
}

.container{
    width:400px;
    margin:50px auto;
    padding:20px;
    background:white;
    border-radius:10px;
    box-shadow:0px 0px 10px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
}

input, select{
    width:100%;
    padding:8px;
    margin:8px 0;
}

button{
    width:100%;
    padding:10px;
    background:#007BFF;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

.result{
    margin-top:15px;
    font-weight:bold;
    text-align:center;
}
</style>

</head>

<body>

<div class="container">

<h2>Business Outcome Predictor</h2>

<form id="predictForm" onsubmit="event.preventDefault(); predict();">

<label>Investment</label>
<input type="number" id="investment" name="Investment" required>

<label>Location</label>
<select id="location" name="Location">
<option>Mumbai</option>
<option>Delhi</option>
<option>Bangalore</option>
<option>Hyderabad</option>
<option>Chennai</option>
<option>Pune</option>
<option>Kolkata</option>
</select>

<label>Competition Level (1-10)</label>
<input type="number" id="competition" name="CompetitionLevel" required>

<label>Target Customers</label>
<input type="number" id="customers" name="TargetCustomers" required>

<label>Monthly Rent</label>
<input type="number" id="rent" name="MonthlyRent" required>

<label>Marketing Budget</label>
<input type="number" id="marketing" name="MarketingBudget" required>

<button type="submit">Predict Business Outcome</button>

</form>

<div class="result" id="result"></div>

<script>
const backendUrl = 'https://your-railway-app-url.railway.app'; // Replace with your Railway backend URL

async function predict() {
    const formData = new FormData(document.getElementById("predictForm"));
    try {
        const response = await fetch(`${backendUrl}/predict`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(Object.fromEntries(formData.entries()))
        });

        const result = await response.json();
        if (response.ok) {
            document.getElementById("result").innerHTML = `Prediction Result: ${result.prediction}`;
        } else {
            document.getElementById("result").innerHTML = `Error: ${result.error}`;
        }
    } catch (error) {
        document.getElementById("result").innerHTML = 'Error occurred during prediction. Please try again.';
        console.error('Error:', error);
    }
}
</script>

</body>
</html>
